# ============================================================================
# Plexichat PR Checks — GitHub Actions
# ============================================================================
# Mirrors the GitLab CI pipeline from plexichat/.gitlab-ci.yml (server only).
# Client CI is managed separately in the plexichat-client GitLab repo.
#
# Triggered by:
#   - pull_request_target (PRs against dev — runs in base repo context)
#   - workflow_call   (reusable by relay-pr.yml after metadata capture)
#
# ⚠️  SECURITY NOTE — pull_request_target + untrusted code execution:
# This workflow uses pull_request_target AND checks out the fork's code to
# run linters, security scanners, and tests. This means the fork's
# .pre-commit-config.yaml, requirements.txt, package.json, etc. ARE
# executed in the base repo's CI context.
#
# Mitigations in place:
#   1. NO custom secrets are exposed to these jobs — only the built-in
#      GITHUB_TOKEN with minimal permissions (contents: read, prs: read,
#      checks: write).
#   2. pip install uses --require-hashes (prevents arbitrary dependency
#      injection).
#   3. The relay workflow (relay-pr.yml) is COMPLETELY SEPARATE and runs
#      after CI passes — secrets are only in that workflow, gated by
#      the gitlab-relay environment.
#   4. The GITHUB_TOKEN cannot write to the repo or access secrets.
#
# ACCEPTED RISK: A malicious fork could still exfiltrate the read-only
#   GITHUB_TOKEN, consume CI minutes, or use the runner for cryptomining.
#   This is the inherent tradeoff of running CI on untrusted PR code.
#   If this is unacceptable, switch to a two-workflow approach where CI
#   runs in a restricted pull_request context and only the relay uses
#   pull_request_target.
# ============================================================================

name: PR Checks

on:
  pull_request_target:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]
  # workflow_call is reserved for future programmatic reuse from other workflows.
  # Currently the relay-pr.yml uses workflow_run (event-driven), not workflow_call.
  # workflow_call:
  #   inputs:
  #     pr_number: { type: string, required: false }
  #     head_sha: { type: string, required: false }

# Explicit permissions: read-only everywhere, write only where needed
permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # SERVER CI — mirrors plexichat/.gitlab-ci.yml
  # ==========================================================================

  server-lint:
    name: "Server: Lint (pre-commit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install ruff==0.15.10 pyright bandit[toml] detect-secrets pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: .cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files --show-diff-on-failure

  server-security:
    name: "Server: Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install pip-audit safety

      - name: Dependency audit (pip-audit)
        run: |
          source .venv/bin/activate
          pip-audit -r requirements.txt --format json > pip-audit-report.json
          pip-audit -r requirements.txt

      - name: Dependency audit (safety)
        run: |
          source .venv/bin/activate
          safety scan -r requirements.txt --json > safety-report.json
          safety scan -r requirements.txt

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-security-reports-${{ github.run_id }}
          path: |
            pip-audit-report.json
            safety-report.json
          retention-days: 30
          overwrite: true

  server-test:
    name: "Server: Self-Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install --require-hashes -r requirements.txt

      - name: Run self-test
        run: |
          source .venv/bin/activate
          mkdir -p .plexichat
          python main.py self-test

  # Client CI is managed separately in the plexichat-client GitLab repo.
