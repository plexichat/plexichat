stages:
  - lint
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  GIT_SUBMODULE_STRATEGY: recursive

cache:
  key:
    files:
      - requirements.txt
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .venv/
  policy: pull-push

# =========================================================
# BASE PYTHON ENV (shared)
# =========================================================

.python_base:
  image: python:3.11-bullseye
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    # Install ALL tooling once
    - pip install \
        ruff==0.15.10 \
        pyright \
        bandit[toml] \
        detect-secrets \
        pip-audit \
        safety
    - git submodule update --init --recursive

# =========================================================
# LINT STAGE (mirrors pre-commit exactly)
# =========================================================

lint:ruff:
  extends: .python_base
  stage: lint
  script:
    - ruff check . --output-format=gitlab > ruff-report.json
    - ruff check .
  artifacts:
    reports:
      codequality: ruff-report.json
    paths:
      - ruff-report.json
    expire_in: 7 days


lint:types:
  extends: .python_base
  stage: lint
  script:
    - pyright src/ --outputjson > pyright-report.json || true
  artifacts:
    paths:
      - pyright-report.json
    expire_in: 7 days
  allow_failure: true

# =========================================================
# SECURITY STAGE (FULL COVERAGE)
# =========================================================

# --- Bandit (matches pre-commit) ---
security:bandit:
  extends: .python_base
  stage: security
  script:
    - bandit -r src/ -c .bandit -f json -o bandit-report.json
    - bandit -r src/ -c .bandit
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# --- Detect-secrets (matches pre-commit) ---
security:detect_secrets:
  extends: .python_base
  stage: security
  script:
    - detect-secrets scan > .secrets.baseline
    - detect-secrets audit .secrets.baseline || true
  artifacts:
    paths:
      - .secrets.baseline
    expire_in: 30 days
  allow_failure: true

# --- GitLab Secret Detection (extra coverage) ---
security:secret_detection:  # pragma: allowlist secret
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/secrets:latest  # pragma: allowlist secret
  variables:
    GIT_DEPTH: 100
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json  # pragma: allowlist secret
    paths:
      - gl-secret-detection-report.json
    expire_in: 30 days
  allow_failure: false

# --- SAST (Semgrep) ---
security:sast:
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/semgrep:latest
  variables:
    SAST_EXCLUDED_PATHS: ".venv/,venv/,tests/,.cache/,build/,dist/"
    GIT_DEPTH: 0
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    expire_in: 30 days
  allow_failure: true

# --- Dependency scanning (NOT in pre-commit, keep it) ---
security:dependency_scanning:
  extends: .python_base
  stage: security
  script:
    - pip-audit -r requirements.txt --format json > pip-audit-report.json
    - pip-audit -r requirements.txt
    - safety check -r requirements.txt --json > safety-report.json
    - safety check -r requirements.txt
  artifacts:
    paths:
      - pip-audit-report.json
      - safety-report.json
    expire_in: 30 days