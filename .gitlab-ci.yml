# Plexichat GitLab CI/CD Configuration
# Comprehensive test pipeline with security scanning, parallel execution, and coverage reporting
# Target: ~3000 tests across all modules

stages:
  - lint
  - security
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  GIT_SUBMODULE_STRATEGY: recursive
  COVERAGE_TARGET: "3000"

# Global cache configuration
cache:
  key:
    files:
      - requirements.txt
      - requirements-test.txt
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .venv/
  policy: pull-push

# Base Python setup template
.python_base:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git ffmpeg
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip setuptools wheel
    - pip install -r requirements.txt
    - pip install -r requirements-test.txt
    - git submodule update --init --recursive

# =============================================================================
# STAGE 1: LINT - Fast code quality checks (parallel execution)
# =============================================================================

lint:ruff:
  extends: .python_base
  stage: lint
  timeout: 10m
  cache:
    policy: pull
  script:
    - pip install ruff
    - ruff check src/ --output-format=gitlab > ruff-report.json || true
    - ruff check src/
  artifacts:
    reports:
      codequality: ruff-report.json
    paths:
      - ruff-report.json
    expire_in: 7 days
  allow_failure: true

lint:format:
  extends: .python_base
  stage: lint
  timeout: 5m
  cache:
    policy: pull
  script:
    - pip install ruff
    - ruff format --check src/
  allow_failure: true

lint:types:
  extends: .python_base
  stage: lint
  timeout: 15m
  cache:
    policy: pull
  script:
    - pip install pyright
    - pyright src/ --outputjson > pyright-report.json || true
  artifacts:
    paths:
      - pyright-report.json
    expire_in: 7 days
  allow_failure: true

# =============================================================================
# STAGE 2: SECURITY - Comprehensive security scanning (separate jobs)
# =============================================================================

security:secret_detection:
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/secrets:latest
  variables:
    GIT_DEPTH: 100
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json
    paths:
      - gl-secret-detection-report.json
    expire_in: 30 days
  allow_failure: false

security:sast:
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/semgrep:latest
  variables:
    SAST_EXCLUDED_PATHS: ".venv/,venv/,tests/,.cache/,build/,dist/"
    GIT_DEPTH: 0
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    expire_in: 30 days
  allow_failure: true

security:dependency_scanning:
  extends: .python_base
  stage: security
  timeout: 15m
  cache:
    policy: pull
  script:
    - pip install pip-audit safety
    - echo "Running pip-audit on requirements..."
    - pip-audit -r requirements.txt --format json > pip-audit-requirements.json || true
    - pip-audit -r requirements-test.txt --format json > pip-audit-test.json || true
    - echo "Running safety check..."
    - safety check -r requirements.txt --json > safety-requirements.json || true
    - safety check -r requirements-test.txt --json > safety-test.json || true
  artifacts:
    paths:
      - pip-audit-requirements.json
      - pip-audit-test.json
      - safety-requirements.json
      - safety-test.json
    expire_in: 30 days
  allow_failure: true

security:bandit:
  extends: .python_base
  stage: security
  timeout: 15m
  cache:
    policy: pull
  script:
    - pip install bandit[toml]
    - bandit -r src/ -f json -o bandit-report.json -ll || true
    - bandit -r src/ -ll
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 30 days
  allow_failure: true

security:api_tests:
  extends: .python_base
  stage: security
  timeout: 20m
  cache:
    policy: pull
  script:
    - pytest src/tests/api/security/ -v --tb=short --junitxml=security-api-report.xml
  artifacts:
    when: always
    reports:
      junit: security-api-report.xml
    paths:
      - security-api-report.xml
    expire_in: 30 days
  allow_failure: false

security:comprehensive_tests:
  extends: .python_base
  stage: security
  timeout: 20m
  cache:
    policy: pull
  script:
    - pytest src/tests/security/ -v --tb=short --junitxml=security-comprehensive-report.xml
  artifacts:
    when: always
    reports:
      junit: security-comprehensive-report.xml
    paths:
      - security-comprehensive-report.xml
    expire_in: 30 days
  allow_failure: false

# =============================================================================
# STAGE 3: TEST - Parallel test execution by module (~3000 tests)
# =============================================================================

# Quick smoke test - runs first to catch major issues
test:smoke:
  extends: .python_base
  stage: test
  timeout: 10m
  cache:
    policy: pull
  script:
    - pytest src/tests/unit/test_env_config.py src/tests/test_infrastructure.py src/tests/api/test_health.py -v --tb=short --junitxml=smoke-report.xml
  artifacts:
    when: always
    reports:
      junit: smoke-report.xml
    paths:
      - smoke-report.xml
    expire_in: 7 days

# Unit tests - fast, foundational tests
test:unit:
  extends: .python_base
  stage: test
  timeout: 20m
  cache:
    policy: pull
  script:
    - pytest src/tests/unit/ -v --tb=short --junitxml=unit-report.xml --cov=src --cov-report=xml:coverage-unit.xml --cov-report=term -n auto
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      junit: unit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-unit.xml
    paths:
      - unit-report.xml
      - coverage-unit.xml
    expire_in: 30 days
  needs: ["test:smoke"]

