# =============================================================================
# STAGE 4: REPORT - Aggregate coverage and test results
# =============================================================================

report:coverage:
  extends: .python_base
  stage: report
  timeout: 10m
  cache:
    policy: pull
  script:
    - pip install coverage[toml]
    - coverage combine coverage-*.xml 2>/dev/null || true
    - coverage report --skip-covered --skip-empty
    - coverage xml -o coverage-combined.xml
    - coverage html -d coverage-html
    - |
      echo "========================================"
      echo "Coverage Report Summary"
      echo "========================================"
      coverage report --skip-empty
      echo ""
      echo "Target: ${COVERAGE_TARGET} tests"
      echo "========================================"
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-combined.xml
    paths:
      - coverage-combined.xml
      - coverage-html/
    expire_in: 30 days
  needs:
    - test:unit
    - test:api
    - test:auth
    - test:servers
    - test:messaging
    - test:media
    - test:websocket
    - test:automod
    - test:voice
