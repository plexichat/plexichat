    - test:ratelimit
    - test:reactions
    - test:relationships
    - test:threads
    - test:webhooks
    - test:applications
    - test:embeds
    - test:events
    - test:polls
    - test:stickers
    - test:soundboard
    - test:encryption
    - test:database
    - test:infrastructure

report:test_summary:
  image: python:3.11-slim
  stage: report
  timeout: 5m
  before_script:
    - pip install junitparser
  cache: {}
  script:
    - |
      python3 << 'EOF'
      from junitparser import JUnitXml
      import glob
      import sys
      
      total_tests = 0
      total_failures = 0
      total_errors = 0
      total_skipped = 0
      
      print("=" * 80)
      print("TEST EXECUTION SUMMARY")
      print("=" * 80)
      print()
      
      for report_file in sorted(glob.glob("*-report.xml")):
          try:
              xml = JUnitXml.fromfile(report_file)
              tests = xml.tests
              failures = xml.failures
              errors = xml.errors
              skipped = xml.skipped
              
              total_tests += tests
              total_failures += failures
              total_errors += errors
              total_skipped += skipped
              
              module = report_file.replace("-report.xml", "")
              status = "✓" if (failures == 0 and errors == 0) else "✗"
              print(f"{status} {module:25} Tests: {tests:5} | Failures: {failures:3} | Errors: {errors:3} | Skipped: {skipped:3}")
          except Exception as e:
              print(f"✗ {report_file:25} Error reading report: {e}")
      
      print()
      print("=" * 80)
      print(f"TOTAL: {total_tests} tests | {total_failures} failures | {total_errors} errors | {total_skipped} skipped")
      print("=" * 80)
      print()
      
      if total_tests < 3000:
          print(f"⚠️  Warning: Only {total_tests} tests executed (target: 3000)")
      else:
          print(f"✓ Test count target met: {total_tests} tests")
      
      print()
      
      if total_failures > 0 or total_errors > 0:
          print("❌ Tests FAILED")
          sys.exit(1)
      else:
          print("✅ All tests PASSED")
          sys.exit(0)
      EOF
  needs:
    - test:smoke
    - test:unit
    - test:api
    - test:auth
    - test:servers
    - test:messaging
    - test:media
    - test:websocket
    - test:automod
    - test:voice
    - test:search
    - test:notifications
    - test:presence
    - test:ratelimit
    - test:reactions
    - test:relationships
    - test:threads
    - test:webhooks
    - test:applications
    - test:embeds
    - test:events
    - test:polls
    - test:stickers
    - test:soundboard
    - test:encryption
    - test:database
    - test:infrastructure
    - security:api_tests
    - security:comprehensive_tests

# =============================================================================
# SCHEDULED/MANUAL JOBS
# =============================================================================

# Weekly comprehensive security audit
security:weekly_audit:
  extends: .python_base
  stage: security
  timeout: 30m
  cache:
    policy: pull
  script:
    - pip install bandit[toml] pip-audit safety
    - echo "Running comprehensive security audit..."
    - bandit -r src/ -f json -o bandit-weekly.json -ll
    - pip-audit -r requirements.txt --format json > pip-audit-weekly.json
    - safety check -r requirements.txt --json > safety-weekly.json
  artifacts:
    paths:
      - bandit-weekly.json
      - pip-audit-weekly.json
      - safety-weekly.json
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: false

# Full integration test suite (manual trigger)
test:full_integration:
  extends: .python_base
  stage: test
  timeout: 3h
  cache:
    policy: pull
  script:
    - pytest src/tests/ -v --tb=short --junitxml=full-integration-report.xml --cov=src --cov-report=xml:coverage-full.xml --cov-report=html:coverage-full-html --cov-report=term-missing -n auto
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      junit: full-integration-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-full.xml
    paths:
      - full-integration-report.xml
      - coverage-full.xml
      - coverage-full-html/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: false
