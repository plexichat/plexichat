stages:
  - lint
  - security
  - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

cache:
  key:
    files:
      - requirements.txt
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .venv/
  policy: pull-push

# =========================================================
# BASE PYTHON ENV (shared)
# =========================================================

.python_base:
  image: 
    name: python:3.12-bullseye
    pull_policy: if-not-present
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - |
      if [ -d ".venv" ]; then
        echo "Using cached virtual environment"
        source .venv/bin/activate
      else
        echo "Creating new virtual environment"
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install \
            ruff==0.15.10 \
            pyright \
            bandit[toml] \
            detect-secrets \
            pip-audit \
            safety
      fi
    # common-utils is bundled directly in the repository at src/utils/common-utils/

# =========================================================
# LINT STAGE (Consolidated via pre-commit)
# =========================================================

lint:pre-commit:
  extends: .python_base
  stage: lint
  variables:
    PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
  cache:
    key:
      files:
        - .pre-commit-config.yaml
      prefix: pre-commit-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pre-commit
    policy: pull-push
  script:
    - pip install pre-commit
    - pre-commit run --all-files --show-diff-on-failure
  resource_group: plexichat-ci

# =========================================================
# SECURITY STAGE (FULL COVERAGE)
# =========================================================

# Bandit and detect-secrets are now handled by pre-commit in the lint stage.
# We keep GitLab-specific and dependency scanning jobs here.

# --- GitLab Secret Detection (extra coverage) ---
security:secret_detection:  # pragma: allowlist secret
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/secrets:latest  # pragma: allowlist secret
  variables:
    GIT_DEPTH: 100
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json  # pragma: allowlist secret
    paths:
      - gl-secret-detection-report.json
    expire_in: 30 days
  resource_group: plexichat-ci
  allow_failure: false

# --- SAST (Semgrep) ---
security:sast:
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/analyzers/semgrep:latest
  variables:
    SAST_EXCLUDED_PATHS: ".venv/,venv/,tests/,.cache/,build/,dist/"
    GIT_DEPTH: 0
  before_script: []
  cache: {}
  script:
    - /analyzer run
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    expire_in: 30 days
  resource_group: plexichat-ci
  allow_failure: true

# --- Dependency scanning (NOT in pre-commit, keep it) ---
security:dependency_scanning:
  extends: .python_base
  stage: security
  script:
    - pip-audit -r requirements.txt --format json > pip-audit-report.json
    - pip-audit -r requirements.txt
    - safety check -r requirements.txt --json > safety-report.json
    - safety check -r requirements.txt
  artifacts:
    paths:
      - pip-audit-report.json
      - safety-report.json
    expire_in: 30 days
  resource_group: plexichat-ci

docker:build_and_push:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_BUILDKIT: "1"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^a\.\d+\.\d+-\d+$/'
  script:
    - echo "Building backend docker image for tag $CI_COMMIT_TAG"
    - docker build -t $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$CI_COMMIT_TAG -t $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:latest .
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY:80"
    - docker push $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:latest
    # Push to Docker Hub
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker tag $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$CI_COMMIT_TAG plexichat/plexichat:$CI_COMMIT_TAG
    - docker tag $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$CI_COMMIT_TAG plexichat/plexichat:latest
    - docker push plexichat/plexichat:$CI_COMMIT_TAG
    - docker push plexichat/plexichat:latest
  resource_group: plexichat-ci

docker:cleanup_old_images:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: '$CI_COMMIT_TAG =~ /^a\.\d+\.\d+-\d+$/'
  script:
    - echo "Cleaning up old Docker images based on retention policy"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY:80"
    - |
      # Get all tags for backend image
      ALL_TAGS=$(docker image ls --format '{{.Tag}}' $CI_REGISTRY:80/$CI_PROJECT_PATH/backend | grep -E '^a\.[0-9]+\.[0-9]+-[0-9]+$' | sort -V || true)
      
      # Separate by version type
      ALPHA_TAGS=$(echo "$ALL_TAGS" | grep -E '\-alpha' || echo "")
      BETA_TAGS=$(echo "$ALL_TAGS" | grep -E '\-beta' || echo "")
      RELEASE_TAGS=$(echo "$ALL_TAGS" | grep -v -E '\-(alpha|beta)' || echo "")
      
      # Keep last 5 alpha builds
      if [ -n "$ALPHA_TAGS" ]; then
        ALPHA_TO_DELETE=$(echo "$ALPHA_TAGS" | head -n -5)
        for tag in $ALPHA_TO_DELETE; do
          echo "Deleting old alpha build: $tag"
          docker rmi $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$tag || true
        done
      fi
      
      # Keep last 10 beta builds
      if [ -n "$BETA_TAGS" ]; then
        BETA_TO_DELETE=$(echo "$BETA_TAGS" | head -n -10)
        for tag in $BETA_TO_DELETE; do
          echo "Deleting old beta build: $tag"
          docker rmi $CI_REGISTRY:80/$CI_PROJECT_PATH/backend:$tag || true
        done
      fi
      
      # Keep all releases (no deletion)
      echo "Keeping all release tags: $RELEASE_TAGS"
  allow_failure: true
  resource_group: plexichat-ci
