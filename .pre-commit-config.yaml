repos:
  #  Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        pass_filenames: false
        entry: ruff check --fix .
        args: [
          "--extend-exclude",
          ".venv,venv,.pytest_cache,cache,temp,temp_test,temp_test_*,temp_notifications_test,temp_relationships_test,temp_voice_test,temp_embeds_test,temp_test_security,uploads,media,config,logs,src/utils/common-utils,src/tests"
        ]
      - id: ruff-format
        pass_filenames: false
        entry: ruff format .

  #  Type checking
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        exclude: |
          (?x)^(
              src/core/migrations/cloner\.py|
              src/utils/encryption/kek_migration\.py|
              src/api/routes/docs/.*\.py
          )$
        additional_dependencies:
          - fastapi
          - pydantic>=2.0.0
          - uvicorn[standard]
          - starlette
          - httpx
          - aiohttp
          - websockets
          - cryptography
          - pyotp
          - pillow
          - redis
          - cachetools
          - pytest
          - qrcode[pil]
          - xxhash
          - websocket-client
          - PyYAML
          - imagehash
          - boto3
          - google-re2
          - email-validator
          - python-multipart
          - python-dotenv
          - python-dateutil
          - sqlalchemy
          - hiredis
          - requests
          - types-PyYAML
          - types-requests
          - types-python-dateutil
          - types-redis

  #  Basic security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", ".bandit"]

  #  Semgrep
  # Disabled on Windows due to Unicode encoding issues in console
  # - repo: local
  #   hooks:
  #     - id: semgrep
  #       name: semgrep
  #       entry: semgrep
  #       language: system
  #       types: [python]
  #       args: ["--config=auto", "--quiet"]

  #  Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: |
          (?x)^(
              src/tests/.*|
              docs/.*|
              .*/README\.md|
              src/core/selftest/.*|
          )$