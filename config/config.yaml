application:
  environment: development
  name: PlexiChat
  version: 0.1.0
authentication:
  accounts:
    allow_registration: true
    require_email_verification: false
    max_bots_per_user: 5
    username_min_length: 3
    username_max_length: 32
    username_pattern: "^[a-zA-Z0-9_]+$"
  sessions:
    token_bytes: 32
    expire_hours: 168
    max_per_user: 10
    extend_on_activity: true
    extend_threshold_hours: 24
  security:
    max_failed_attempts: 5
    lockout_duration_minutes: 15
    require_2fa_for_sensitive_ops: false
  totp:
    enabled: true
    issuer: PlexiChat
    digits: 6
    interval: 30
    backup_code_count: 10
    backup_code_length: 8
  password:
    min_length: 12
    max_length: 128
    require_uppercase: true
    require_lowercase: true
    require_digit: true
    require_special: true
  tracking:
    track_devices: true
    track_ips: true
    notify_new_device: false
    notify_new_ip: false
  bots:
    token_bytes: 48
    require_owner_2fa: false
database:
  connection_pool:
    max_connections: 10
    min_connections: 1
  path: data/plexichat.db
  postgres:
    dbname: plexichat
    host: localhost
    password: ''
    port: 5432
    user: postgres
  type: sqlite
encryption:
  aes_gcm:
    key_length: 32
    nonce_length: 12
    tag_length: 16
  argon2:
    hash_length: 32
    memory_cost: 65536
    parallelism: 2
    salt_length: 16
    time_cost: 2
  snowflake:
    datacenter_id: 1
    epoch: '2024-01-01T00:00:00Z'
    worker_id: 1
logging:
  backup_count: 5
  level: DEBUG
  max_bytes: 10485760
  rotate: true
  zip_logs: true

messaging:
  # Message limits
  max_message_length: 4000
  max_group_participants: 100
  message_preview_length: 100
  
  # Attachment limits
  max_attachment_size: 10485760  # 10MB
  max_attachments_per_message: 10
  
  # DM settings
  dm_auto_create: true
  
  # Encryption
  encrypt_messages: true
  encrypt_attachments: true
  
  # Content filtering
  content:
    profanity_words: []
    nsfw_patterns: []
    default_filter_action: censor
