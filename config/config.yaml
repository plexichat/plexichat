application:
  environment: development
  name: PlexiChat
  version: 0.1.0
authentication:
  account_lockout:
    lockout_duration_minutes: 15
    max_failed_attempts: 5
  jwt:
    access_token_expire_minutes: 30
    algorithm: HS256
    refresh_token_expire_days: 7
    secret_key: CHANGE_THIS_IN_PRODUCTION
  password:
    min_length: 8
    require_digit: true
    require_lowercase: true
    require_special: true
    require_uppercase: true
  session:
    max_concurrent_sessions: 3
database:
  connection_pool:
    max_connections: 10
    min_connections: 1
  path: data/plexichat.db
  postgres:
    dbname: plexichat
    host: localhost
    password: ''
    port: 5432
    user: postgres
  type: sqlite
encryption:
  aes_gcm:
    key_length: 32
    nonce_length: 12
    tag_length: 16
  argon2:
    hash_length: 32
    memory_cost: 65536
    parallelism: 2
    salt_length: 16
    time_cost: 2
  snowflake:
    datacenter_id: 1
    epoch: '2024-01-01T00:00:00Z'
    worker_id: 1
logging:
  backup_count: 5
  level: DEBUG
  max_bytes: 10485760
  rotate: true
  zip_logs: true
