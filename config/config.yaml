# PlexiChat Configuration File

logging:
  level: DEBUG
  max_bytes: 10485760
  backup_count: 5
  zip_logs: true
  rotate: true

database:
  type: sqlite
  path: data/plexichat.db
  postgres:
    host: localhost
    port: 5432
    user: postgres
    password: ""
    dbname: plexichat
  connection_pool:
    min_connections: 1
    max_connections: 10

authentication:
  jwt:
    secret_key: CHANGE_THIS_IN_PRODUCTION
    algorithm: HS256
    access_token_expire_minutes: 30
    refresh_token_expire_days: 7
  password:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_digit: true
    require_special: true
  account_lockout:
    max_failed_attempts: 5
    lockout_duration_minutes: 15
  session:
    max_concurrent_sessions: 3

encryption:
  argon2:
    time_cost: 2
    memory_cost: 65536
    parallelism: 2
    hash_length: 32
    salt_length: 16
  aes_gcm:
    key_length: 32
    nonce_length: 12
    tag_length: 16
  snowflake:
    epoch: "2024-01-01T00:00:00Z"
    worker_id: 1
    datacenter_id: 1

application:
  name: PlexiChat
  version: a.1.0-1
  environment: development

versioning:
  min_supported_version: a.1.0-1
  update_url: null

messaging:
  max_message_length: 4000
  max_group_participants: 100
  max_attachment_size: 10485760
  max_attachments_per_message: 10
  dm_auto_create: true
  encrypt_messages: true
  encrypt_attachments: true
  message_preview_length: 100

servers:
  max_servers_per_user: 100
  max_channels_per_server: 500
  max_roles_per_server: 250
  max_members_per_server: 250000
  server_name_min_length: 2
  server_name_max_length: 100
  channel_name_min_length: 1
  channel_name_max_length: 100
  role_name_min_length: 1
  role_name_max_length: 100
  invite_code_length: 8

reactions:
  max_reactions_per_message: 20
  max_users_per_reaction_page: 100

stickers:
  max_packs_per_server: 50
  max_stickers_per_pack: 50
  max_sticker_size: 524288
  max_sticker_name_length: 30
  max_pack_name_length: 50
  max_pack_description_length: 200
  allowed_formats:
    - png
    - apng
    - json
  max_suggestions: 10

polls:
  min_options: 2
  max_options: 10
  min_duration_hours: 1
  max_duration_hours: 168
  max_question_length: 300
  max_option_length: 100

soundboard:
  max_sounds_per_server: 100
  max_sound_size: 524288
  max_sound_duration_seconds: 5
  max_sound_name_length: 30
  allowed_formats:
    - mp3
    - ogg
  default_cooldown_seconds: 5
  max_cooldown_seconds: 300
