[tool.bandit]
skips = ["B601"]
confidence = "HIGH"
severity = "MEDIUM"
exclude = [".venv", "venv", ".pytest_cache", "cache", "temp", "uploads", "media", "logs", "src/tests", "tests", "**/__pycache__"]
# Targets limited to src/; test dirs excluded above.
# B101 (assert) is intentionally NOT globally skipped — assert in production
# code is a security concern. Use `# nosec B101` for legitimate uses.
targets = ["src"]
