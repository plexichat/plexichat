[pytest]
# Python path setup
pythonpath = 
    .
    src
    src/utils
    src/utils/common_utils

# Test discovery
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore directories with fixture issues
norecursedirs = settings stickers search soundboard security test_database.py test_database_benchmarks.py test_redis.py test_sqlite_load.py test_database_load.py test_database_pool.py test_pool_monitoring.py test_postgres_docker.py test_infrastructure.py test_selftest.py

# Markers
markers =
    unit: Fast unit tests, no database required
    integration: Tests requiring full module setup
    slow: Intentionally slow tests (rate limiting, timeouts)
    security: Security-related tests that must not fail
    auth: Authentication module tests
    messaging: Messaging module tests
    servers: Server module tests
    presence: Presence module tests
    relationships: Relationships module tests
    reactions: Reactions module tests
    webhooks: Webhooks module tests
    threads: Threads module tests
    notifications: Notifications module tests
    ratelimit: Rate limiting tests
    api: API route tests
    applications: Applications module tests
    media: Media module tests
    search: Search module tests
    stickers: Stickers module tests
    polls: Polls module tests
    soundboard: Soundboard module tests
    settings: User settings module tests
    voice: Voice module tests
    websocket: WebSocket module tests
    encryption: Encryption module tests
    embeds: Embeds module tests
    automod: Auto-moderation module tests
    performance: Performance and load tests
    production_simulation: Production simulation tests
    multiprocess: Multiprocess tests
    requires_postgres: Tests requiring PostgreSQL

# Default options
# NOTE: xdist parallelism is opt-in via PYTEST_XDIST=1 so the
# Windows dev machine (no GNU parallel) still runs serially. The
# ``-n auto --dist loadfile`` combination maximises cache hits by
# pinning each file to one worker.
addopts =
    --strict-markers
    -v
    --tb=short
    --maxfail=50
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    --timeout=60
    -m "not slow and not performance and not production_simulation and not multiprocess and not requires_postgres"

# Minimum pytest version
minversion = 7.0

# Console output style
console_output_style = progress

# JUnit XML output for CI/CD
junit_family = xunit2
