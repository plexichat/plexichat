[pytest]
# Python path setup - each path on separate line for cross-platform compatibility
pythonpath = 
    .
    src
    src/utils
    src/utils/common-utils

# Test discovery
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers (also registered in conftest.py for IDE support)
markers =
    unit: Fast unit tests, no database required
    integration: Tests requiring full module setup
    slow: Intentionally slow tests (rate limiting, timeouts)
    auth: Authentication module tests
    messaging: Messaging module tests
    servers: Server module tests
    presence: Presence module tests
    relationships: Relationships module tests
    reactions: Reactions module tests
    webhooks: Webhooks module tests
    threads: Threads module tests
    notifications: Notifications module tests
    ratelimit: Rate limiting tests
    api: API route tests
    applications: Applications module tests

# Default options
addopts = 
    --strict-markers
    -v
    --tb=short

# Timeout for individual tests (prevents hanging)
# Session setup may take longer due to user pool creation
timeout = 60

# Ignore deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum pytest version
minversion = 7.0

# Parallel execution settings (for pytest-xdist)
# Uncomment to enable by default:
# addopts = -n auto

# Coverage settings (for pytest-cov)
# Uncomment to enable by default:
# addopts = --cov=src --cov-report=term-missing
