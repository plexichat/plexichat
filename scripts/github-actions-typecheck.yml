# GitHub Actions Type Check Workflow Example
#
# Add this to .github/workflows/typecheck.yml

name: Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly type check report every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  typecheck-json:
    name: Type Check (JSON)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Initialize common-utils submodule
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pyright
      run: npm install -g pyright
    
    - name: Install Python dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
    
    - name: Run type check (JSON)
      run: |
        source .venv/bin/activate
        python scripts/type_check_json.py > type_check_results.json
    
    - name: Analyze results
      id: analyze
      run: |
        source .venv/bin/activate
        python scripts/example_json_consumer.py
        
        # Extract stats for GitHub Actions summary
        ERRORS=$(python -c "import json; print(json.load(open('type_check_results.json'))['aggregated_statistics']['total_errors'])")
        WARNINGS=$(python -c "import json; print(json.load(open('type_check_results.json'))['aggregated_statistics']['total_warnings'])")
        
        echo "errors=$ERRORS" >> $GITHUB_OUTPUT
        echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
    
    - name: Upload JSON results
      uses: actions/upload-artifact@v4
      with:
        name: type-check-json
        path: type_check_results.json
        retention-days: 30
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const errors = '${{ steps.analyze.outputs.errors }}';
          const warnings = '${{ steps.analyze.outputs.warnings }}';
          
          const body = `## Type Check Results\n\n` +
            `- **Errors:** ${errors}\n` +
            `- **Warnings:** ${warnings}\n\n` +
            (errors > 0 ? '❌ Type errors found' : '✅ No type errors');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
    
    - name: Fail on errors
      if: steps.analyze.outputs.errors > 0
      run: |
        echo "❌ Type check failed: ${{ steps.analyze.outputs.errors }} errors"
        exit 1

  typecheck-reports:
    name: Type Check (Reports)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pyright
      run: npm install -g pyright
    
    - name: Install Python dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
    
    - name: Run type check (reports)
      run: |
        source .venv/bin/activate
        python scripts/type_check_all.py
    
    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: type-check-reports
        path: type_check_reports/
        retention-days: 30
    
    - name: Create job summary
      run: |
        echo "## Type Check Reports Generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Detailed reports have been uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quick Stats" >> $GITHUB_STEP_SUMMARY
        
        # Extract summary stats from consolidated report
        if [ -f "type_check_reports/type_check_summary_consolidated.md" ]; then
          # Get first few lines of summary
          head -n 20 type_check_reports/type_check_summary_consolidated.md >> $GITHUB_STEP_SUMMARY
        fi

  typecheck-strict:
    name: Type Check (Strict)
    runs-on: ubuntu-latest
    # Only run strict checks on main branch and PRs to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pyright
      run: npm install -g pyright
    
    - name: Install Python dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
    
    - name: Run strict type check
      run: |
        source .venv/bin/activate
        python scripts/type_check_json.py > type_check_results.json
        
        ERRORS=$(python -c "import json; print(json.load(open('type_check_results.json'))['aggregated_statistics']['total_errors'])")
        WARNINGS=$(python -c "import json; print(json.load(open('type_check_results.json'))['aggregated_statistics']['total_warnings'])")
        
        echo "📊 Type Check Results:"
        echo "  Errors: $ERRORS"
        echo "  Warnings: $WARNINGS"
        
        if [ "$ERRORS" -gt "0" ]; then
          echo "❌ Type check failed: $ERRORS errors found"
          exit 1
        fi
        
        echo "✅ Type check passed"
