# GitLab CI Type Check Integration Example
#
# Add this to your .gitlab-ci.yml to run type checking on all repos
# 
# Usage:
#   include:
#     - local: scripts/gitlab-ci-typecheck.yml

.typecheck_base:
  image: python:3.13
  before_script:
    # Install Node.js and pyright
    - apt-get update && apt-get install -y nodejs npm
    - npm install -g pyright
    # Setup Python environment
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
    # Initialize submodules
    - git submodule update --init --recursive

# Type check with JSON output (for CI metrics)
typecheck:json:
  extends: .typecheck_base
  stage: test
  script:
    - python scripts/type_check_json.py > type_check_results.json
    - python scripts/example_json_consumer.py
  artifacts:
    reports:
      # Store JSON for GitLab to parse
      dotenv: type_check_results.json
    paths:
      - type_check_results.json
    expire_in: 30 days
  allow_failure: true  # Set to false to make type errors block merge

# Type check with human-readable reports
typecheck:reports:
  extends: .typecheck_base
  stage: test
  script:
    - python scripts/type_check_all.py
  artifacts:
    paths:
      - type_check_reports/
    expire_in: 30 days
  allow_failure: true

# Strict type check (fails on any error)
typecheck:strict:
  extends: .typecheck_base
  stage: test
  script:
    - |
      python scripts/type_check_json.py > type_check_results.json
      ERRORS=$(python -c "import json; print(json.load(open('type_check_results.json'))['aggregated_statistics']['total_errors'])")
      echo "Total errors: $ERRORS"
      if [ "$ERRORS" -gt "0" ]; then
        echo "❌ Type check failed: $ERRORS errors found"
        exit 1
      fi
      echo "✅ Type check passed"
  only:
    - main
    - merge_requests
  allow_failure: false  # Block merge on errors

# Weekly type check report
typecheck:weekly:
  extends: .typecheck_base
  stage: test
  script:
    - python scripts/type_check_all.py
    # Could send reports via email, post to Slack, etc.
  artifacts:
    paths:
      - type_check_reports/
    expire_in: 90 days
  only:
    - schedules
  allow_failure: true
