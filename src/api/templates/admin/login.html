<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexichat Admin Login</title>
    <style nonce="{{ csp_nonce }}">
        :root {
            --bg: oklch(0.098 0.005 240);
            --foreground: oklch(0.95 0 0);
            --card: oklch(0.13 0.005 240);
            --card-foreground: oklch(0.95 0 0);
            --primary: oklch(0.75 0.18 165);
            --primary-foreground: oklch(0.13 0.005 240);
            --secondary: oklch(0.18 0.005 240);
            --secondary-foreground: oklch(0.9 0 0);
            --muted: oklch(0.18 0.005 240);
            --muted-foreground: oklch(0.55 0 0);
            --accent: oklch(0.75 0.18 165);
            --destructive: oklch(0.6 0.22 25);
            --border: oklch(0.22 0.005 240);
            --input: oklch(0.18 0.005 240);
            --ring: oklch(0.75 0.18 165);
            --success: oklch(0.7 0.2 145);
            --warning: oklch(0.75 0.18 75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--foreground);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .login-logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--primary);
            color: var(--primary-foreground);
            flex-shrink: 0;
        }

        .login-logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .login-logo-text {
            display: flex;
            flex-direction: column;
        }

        .login-logo-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--foreground);
        }

        .login-logo-subtitle {
            font-size: 12px;
            color: var(--muted-foreground);
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--muted-foreground);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted-foreground);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--input);
            background: var(--secondary);
            color: var(--foreground);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.15s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--ring);
            box-shadow: 0 0 0 2px color-mix(in oklch, var(--ring) 20%, transparent);
        }

        input::placeholder {
            color: var(--muted-foreground);
            opacity: 0.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            margin-top: 4px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-foreground);
        }

        .btn-primary:hover {
            background: oklch(0.7 0.18 165);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: var(--destructive);
            font-size: 13px;
            margin-top: 12px;
            display: none;
            padding: 10px 12px;
            background: color-mix(in oklch, var(--destructive) 10%, transparent);
            border-radius: 6px;
            border-left: 3px solid var(--destructive);
        }

        .otp-setup {
            display: none;
        }

        .otp-setup h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .otp-setup .login-subtitle {
            margin-bottom: 20px;
        }

        .otp-setup img {
            max-width: 200px;
            margin: 16px auto;
            display: block;
            background: white;
            padding: 12px;
            border-radius: 10px;
        }

        .otp-secret {
            font-family: 'Consolas', 'Courier New', monospace;
            background: var(--bg);
            padding: 10px 12px;
            border-radius: 6px;
            margin: 12px 0;
            word-break: break-all;
            font-size: 13px;
            border: 1px solid var(--border);
            color: var(--muted-foreground);
        }

        .otp-label {
            font-size: 12px;
            color: var(--muted-foreground);
            margin-top: 12px;
            margin-bottom: 4px;
        }

        .warning {
            background: color-mix(in oklch, var(--warning) 15%, transparent);
            color: var(--warning);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            border: 1px solid color-mix(in oklch, var(--warning) 25%, transparent);
        }

        #diag-info { display: none; }

        .error-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted-foreground); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="login-logo-text">
                <span class="login-logo-title">Plexichat</span>
                <span class="login-logo-subtitle">Admin Panel</span>
            </div>
        </div>

        <div id="login-form-container">
            <p class="login-subtitle">Sign in to access the admin panel</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
            </form>
            <div class="error" id="login-error"></div>
        </div>

        <div id="otp-setup" class="otp-setup">
            <h1>Setup 2FA</h1>
            <p class="login-subtitle">Scan this QR code with your authenticator app</p>
            <div class="warning">2FA is required for admin access. This is a one-time setup.</div>
            <img id="qr-code" src="" alt="QR Code">
            <p class="otp-label">Or enter this secret manually:</p>
            <div class="otp-secret" id="otp-secret"></div>
            <form id="otp-setup-form">
                <div class="form-group">
                    <label for="setup-code">Enter code from app</label>
                    <input type="text" id="setup-code" placeholder="000000" required maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code">
                </div>
                <button type="submit" class="btn btn-primary">Verify & Enable 2FA</button>
            </form>
            <div class="error" id="setup-error"></div>
        </div>

        <div id="otp-verify" class="otp-setup">
            <h1>Enter 2FA Code</h1>
            <p class="login-subtitle">Enter the code from your authenticator app</p>
            <form id="otp-verify-form">
                <div class="form-group">
                    <label for="verify-code">6-digit code</label>
                    <input type="text" id="verify-code" placeholder="000000" required maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code">
                </div>
                <button type="submit" class="btn btn-primary">Verify</button>
            </form>
            <div class="error" id="verify-error"></div>
        </div>

    </div>

    <script nonce="{{ csp_nonce }}">
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errDiv = document.getElementById('login-error');
            if (errDiv) {
                errDiv.textContent = "JS Error: " + msg + " (Line " + lineNo + ")";
                errDiv.style.display = 'block';
            }
            return false;
        };

        document.addEventListener('DOMContentLoaded', () => {
            console.log("Admin login page loaded, attaching listeners...");
            let adminId = null;
            let challengeToken = null;

            async function login(e) {
                e.preventDefault();
                console.log("Submit button clicked");
                const btn = document.getElementById('login-btn');
                const err = document.getElementById('login-error');

                if (!btn || !err) {
                    alert("Critical UI error: form elements not found");
                    return;
                }

                btn.disabled = true;
                err.style.display = 'none';

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                console.log("Attempting login for:", username);

                try {
                    const res = await fetch('/api/v1/admin/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });

                    console.log("Response status:", res.status);
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.detail?.error?.message || data.detail || 'Login failed');
                    }

                    if (data.status === 'otp_setup_required') {
                        adminId = data.admin_id;
                        challengeToken = data.challenge_token;
                        document.getElementById('login-form-container').style.display = 'none';
                        document.getElementById('otp-setup').style.display = 'block';
                        document.getElementById('qr-code').src = '/api/v1/qr?size=200x200&data=' + encodeURIComponent(data.otp_qr_uri);
                        document.getElementById('otp-secret').textContent = data.otp_secret;
                    } else if (data.status === 'otp_required') {
                        adminId = data.admin_id;
                        challengeToken = data.challenge_token;
                        document.getElementById('login-form-container').style.display = 'none';
                        document.getElementById('otp-verify').style.display = 'block';
                    } else if (data.token) {
                        console.log("Login successful, token received");
                        sessionStorage.setItem('plexichat-admin-token', data.token);
                        window.location.href = '/api/v1/admin/ui-dashboard';
                    } else {
                        throw new Error("Invalid response from server: " + JSON.stringify(data));
                    }
                } catch (e) {
                    console.error("Login catch block:", e);
                    err.textContent = e.message;
                    err.style.display = 'block';
                } finally {
                    btn.disabled = false;
                }
            }

            async function handleOTP(e, isSetup) {
                e.preventDefault();
                const codeId = isSetup ? 'setup-code' : 'verify-code';
                const errorId = isSetup ? 'setup-error' : 'verify-error';
                const code = document.getElementById(codeId).value;
                const err = document.getElementById(errorId);
                err.style.display = 'none';
                if (!challengeToken) {
                    err.textContent = 'Security challenge missing. Please log in again.';
                    err.style.display = 'block';
                    return;
                }
                try {
                    const res = await fetch('/api/v1/admin/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            admin_id: adminId,
                            code: code,
                            is_setup: isSetup,
                            challenge_token: challengeToken
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'Verification failed');
                    sessionStorage.setItem('plexichat-admin-token', data.token);
                    window.location.href = '/api/v1/admin/ui-dashboard';
                } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
            }

            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', login);
                console.log("Login form listener attached");
            } else {
                console.error("Login form NOT found!");
            }

            const otpSetupForm = document.getElementById('otp-setup-form');
            if (otpSetupForm) otpSetupForm.addEventListener('submit', (e) => handleOTP(e, true));

            const otpVerifyForm = document.getElementById('otp-verify-form');
            if (otpVerifyForm) otpVerifyForm.addEventListener('submit', (e) => handleOTP(e, false));

            const token = sessionStorage.getItem('plexichat-admin-token');
            if (token) {
                fetch('/api/v1/admin/dashboard', { headers: { 'Authorization': 'Bearer ' + token } })
                    .then(r => {
                        if (r.ok) {
                            window.location.href = '/api/v1/admin/ui-dashboard';
                        } else if (r.status === 401) {
                            sessionStorage.removeItem('plexichat-admin-token');
                        }
                    }).catch(err => console.log("Silent dashboard check failed"));
            }
        });
    </script>
</body>
</html>
