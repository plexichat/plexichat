[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    -ra

markers =
    unit: Unit tests for individual components
    integration: Integration tests for cross-module functionality
    config: Tests for the ConfigLoader utility
    logger: Tests for the Logger utility
    validator: Tests for the Validator utility
    version: Tests for the Version utility
    slow: Tests that take significant time to run
    io: Tests that perform file I/O operations
    requires_temp: Tests that require temp directory

filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
